name: Offset Lab Audit

on:
  schedule:
    - cron: "17 14 * * *"
  workflow_dispatch:

jobs:
  live-site:
    name: Live site audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production site
        run: npm run audit:live
